<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="bolt" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="128" height="128" rx="28" fill="url(#bg)"/>

  <!-- Stylized "402" text, compact -->
  <text
    x="64" y="44"
    font-family="system-ui, -apple-system, sans-serif"
    font-weight="800"
    font-size="28"
    fill="rgba(255,255,255,0.9)"
    text-anchor="middle"
    dominant-baseline="central"
    letter-spacing="-1"
  >402</text>

  <!-- Lightning bolt — representing instant payment -->
  <path
    d="M72 56 L56 78 L66 78 L58 100 L82 72 L70 72 Z"
    fill="url(#bolt)"
    stroke="rgba(0,0,0,0.1)"
    stroke-width="1"
    stroke-linejoin="round"
  />

  <!-- Stellar-inspired dots orbiting bottom -->
  <circle cx="36" cy="104" r="4" fill="rgba(255,255,255,0.5)"/>
  <circle cx="52" cy="110" r="3" fill="rgba(255,255,255,0.35)"/>
  <circle cx="76" cy="110" r="3" fill="rgba(255,255,255,0.35)"/>
  <circle cx="92" cy="104" r="4" fill="rgba(255,255,255,0.5)"/>
  <!-- Connecting line -->
  <line x1="40" y1="104" x2="88" y2="104" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>
</svg>
